<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0,
                   maximum-scale=1.0,
                   user-scalable=no"/>
    <meta name="theme-color" content="#0a0a12"/>
    <meta name="mobile-web-app-capable"
          content="yes"/>
    <meta name="apple-mobile-web-app-capable"
          content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style"
          content="black-translucent"/>
    <title>Survivor RPG</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══════════════════════════════════════
     CANVAS
     ══════════════════════════════════════ -->
<canvas id="gameCanvas"></canvas>

<!-- Flash overlay -->
<div id="flash-overlay"></div>

<!-- Toast -->
<div id="toast" class="hidden"></div>

<!-- ══════════════════════════════════════
     SCREEN: MAIN
     ══════════════════════════════════════ -->
<div id="screen-main" class="screen">

    <div class="main-title">
        ⚔️ SURVIVOR RPG
    </div>
    <div class="main-subtitle">
        Chiến Đấu · Tiến Hoá · Sinh Tồn
    </div>

    <div id="main-coins" class="main-coins">
        🪙 0
    </div>

    <div id="main-stats" class="main-stats">
        <span>🗡️ Runs: 0</span>
        <span>💀 Kills: 0</span>
    </div>

    <div class="main-buttons">
        <button id="btn-play"
                class="btn btn-primary">
            ▶️ CHƠI NGAY
        </button>
        <button id="btn-shop"
                class="btn btn-gold">
            🛒 NÂNG CẤP VĨNH VIỄN
        </button>
        <button id="btn-settings"
                class="btn btn-secondary">
            ⚙️ CÀI ĐẶT
        </button>
    </div>

</div>

<!-- ══════════════════════════════════════
     SCREEN: CHAR SELECT
     ══════════════════════════════════════ -->
<div id="screen-charselect"
     class="screen hidden">

    <div class="screen-title">
        🧙 Chọn Nhân Vật
    </div>

    <div id="char-grid"></div>

    <div class="char-select-bottom">
        <button id="btn-back-char"
                class="btn btn-back"
                style="flex:1">
            ← Quay lại
        </button>
        <button id="btn-to-mapselect"
                class="btn btn-primary"
                style="flex:2">
            Chọn Bản Đồ →
        </button>
    </div>

</div>

<!-- ══════════════════════════════════════
     SCREEN: MAP SELECT
     ══════════════════════════════════════ -->
<div id="screen-mapselect"
     class="screen hidden">

    <div class="screen-title">
        🗺️ Chọn Bản Đồ
    </div>

    <div id="map-grid"></div>

    <div class="char-select-bottom">
        <button id="btn-back-map"
                class="btn btn-back">
            ← Quay lại
        </button>
    </div>

</div>

<!-- ══════════════════════════════════════
     SCREEN: LEVEL UP
     ══════════════════════════════════════ -->
<div id="screen-levelup"
     class="screen hidden">

    <div class="levelup-title">
        ⭐ LEVEL UP!
    </div>
    <div class="levelup-sub">
        Chọn 1 nâng cấp
    </div>

    <div id="levelup-cards"></div>

</div>

<!-- ══════════════════════════════════════
     SCREEN: PAUSE
     ══════════════════════════════════════ -->
<div id="screen-pause"
     class="screen hidden">

    <div class="pause-title">⏸ TẠM DỪNG</div>

    <button id="btn-resume"
            class="btn btn-primary"
            style="min-width:200px">
        ▶️ Tiếp tục
    </button>

    <button id="btn-restart-pause"
            class="btn btn-secondary"
            style="min-width:200px">
        🔄 Chơi lại
    </button>

    <button id="btn-quit-pause"
            class="btn btn-back"
            style="min-width:200px">
        🏠 Màn hình chính
    </button>

</div>

<!-- ══════════════════════════════════════
     SCREEN: END
     ══════════════════════════════════════ -->
<div id="screen-end"
     class="screen hidden">

    <div id="end-content">
        <!-- Rendered by JS -->
    </div>

    <div class="end-buttons">
        <button id="btn-restart-end"
                class="btn btn-primary">
            🔄 Chơi lại
        </button>
        <button id="btn-quit-end"
                class="btn btn-back">
            🏠 Trang chủ
        </button>
    </div>

</div>

<!-- ══════════════════════════════════════
     SCREEN: SHOP
     ══════════════════════════════════════ -->
<div id="screen-shop"
     class="screen hidden">

    <div class="screen-title">
        🛒 Nâng Cấp Vĩnh Viễn
    </div>

    <div id="shop-coins"
         class="shop-coins-bar">
        🪙 0
    </div>

    <div id="shop-list"></div>

    <div style="position:fixed;bottom:0;
                left:0;right:0;
                background:var(--c-panel);
                border-top:1px solid
                    var(--c-border);
                padding:10px 16px;
                backdrop-filter:blur(8px);
                z-index:110;">
        <button id="btn-back-shop"
                class="btn btn-back"
                style="width:100%">
            ← Quay lại
        </button>
    </div>

</div>

<!-- ══════════════════════════════════════
     SCREEN: SETTINGS
     ══════════════════════════════════════ -->
<div id="screen-settings"
     class="screen hidden">

    <div class="screen-title">
        ⚙️ Cài Đặt
    </div>

    <!-- BGM -->
    <div class="settings-row">
        <span class="settings-label">
            🎵 Nhạc nền
        </span>
        <label class="toggle">
            <input type="checkbox"
                   id="toggle-bgm"
                   checked/>
            <span class="toggle-slider"></span>
        </label>
    </div>

    <!-- SFX -->
    <div class="settings-row">
        <span class="settings-label">
            🔊 Hiệu ứng âm thanh
        </span>
        <label class="toggle">
            <input type="checkbox"
                   id="toggle-sfx"
                   checked/>
            <span class="toggle-slider"></span>
        </label>
    </div>

    <!-- Particles -->
    <div class="settings-row">
        <span class="settings-label">
            ✨ Hiệu ứng hạt
        </span>
        <label class="toggle">
            <input type="checkbox"
                   id="toggle-particles"
                   checked/>
            <span class="toggle-slider"></span>
        </label>
    </div>

    <div id="settings-version"
         style="color:var(--c-muted);
                font-size:11px;">
        🎮 Survivor RPG v3.0
    </div>

    <!-- Reset -->
    <button id="btn-reset-save"
            class="btn btn-danger"
            style="min-width:200px">
        🗑️ Reset dữ liệu
    </button>

    <button id="btn-back-settings"
            class="btn btn-back"
            style="min-width:200px">
        ← Quay lại
    </button>

</div>

<!-- ══════════════════════════════════════
     HUD (in-game)
     ══════════════════════════════════════ -->
<div id="hud" class="hidden">

    <!-- HP row -->
    <div class="hud-hp-row">
        <span style="font-size:11px;
                     color:#ff4444;">❤️</span>
        <div class="hud-hp-bar-bg">
            <div id="hp-fill"
                 style="width:100%"></div>
        </div>
        <span id="hp-text">200/200</span>
    </div>

    <!-- Info row -->
    <div class="hud-info-row">
        <span id="hud-kills">💀 0</span>
        <span id="hud-coins">🪙 0</span>
        <span id="hud-timer">⏱️ 0:00</span>
        <span id="hud-map-name"
              style="color:var(--c-muted);
                     font-size:10px;">
        </span>
    </div>

    <!-- Weapons row -->
    <div id="hud-weapons"></div>

</div>

<!-- EXP bar (bottom) -->
<div id="hud-exp-bg" class="hidden">
    <div class="exp-bar-outer">
        <div id="exp-fill"
             style="width:0%"></div>
    </div>
    <div id="hud-lv-text">LV 1</div>
</div>

<!-- Shield bar -->
<div id="shield-bar-wrap" class="hidden">
    <div style="font-size:9px;
                color:#4488ff;
                margin-bottom:2px;">
        🔵 Shield
    </div>
    <div class="shield-bar-bg">
        <div id="shield-fill"
             style="width:100%"></div>
    </div>
</div>

<!-- Boss bar -->
<div id="boss-bar-wrap" class="hidden">
    <div id="boss-name-label"
         class="boss-bar-label">
        👹 BOSS
    </div>
    <div class="boss-bar-bg">
        <div id="boss-hp-fill"
             style="width:100%"></div>
    </div>
</div>

<!-- ══════════════════════════════════════
     CONTROLS
     ══════════════════════════════════════ -->

<!-- Joystick -->
<div id="joystick-zone" class="hidden">
    <div id="joystick-stick"></div>
</div>

<!-- Skill buttons -->
<button id="skill-btn" class="hidden">
    <span id="skill-icon">🌪️</span>
    <span id="skill-cd-text"
          class="skill-cd-text"></span>
</button>

<button id="skill2-btn" class="hidden">
    <span id="skill2-icon">⚡</span>
    <span id="skill2-cd-text"
          class="skill-cd-text"></span>
</button>

<!-- Settings (in-game) -->
<button id="settings-btn" class="hidden">
    ⚙️
</button>

<!-- Joystick size config -->
<button id="joystick-cfg-btn"
        class="hidden">
    🕹️
</button>

<!-- ══════════════════════════════════════
     SCRIPTS (thứ tự quan trọng!)
     ══════════════════════════════════════ -->

<!-- Phần 1-5: Core GS object + canvas -->
<script src="js/part01_core.js"></script>

<!-- Phần 6: gameLoop stub -->
<script src="js/part06_loop.js"></script>

<!-- Phần 7: Input (joystick + keyboard) -->
<script src="js/part07_input.js"></script>

<!-- Phần 8: Player init + draw -->
<script src="js/part08_player.js"></script>

<!-- Phần 9: updatePlayer -->
<script src="js/part09_update_player.js"></script>

<!-- Phần 10: Weapons fire -->
<script src="js/part10_weapons.js"></script>

<!-- Phần 11: Bullets update + draw -->
<script src="js/part11_bullets.js"></script>

<!-- Phần 12: Enemies update -->
<script src="js/part12_enemies.js"></script>

<!-- Phần 13: Spawn system -->
<script src="js/part13_spawn.js"></script>

<!-- Phần 14: Skills -->
<script src="js/part14_skills.js"></script>

<!-- Phần 15: Draw (render) -->
<script src="js/part15_draw.js"></script>

<!-- Phần 16: gameLoop hoàn chỉnh
             + SaveSystem + AudioEngine -->
<script src="js/part16_gameloop.js"></script>

<!-- Phần 17: DB.maps + chars + mobs -->
<script src="js/part17_db_maps.js"></script>

<!-- Phần 18: DB.weapons + cards -->
<script src="js/part18_db_weapons.js"></script>

<!-- Phần 19: gainExp + levelUp + applyCard -->
<script src="js/part19_levelup.js"></script>

<!-- Phần 20: killEnemy + endRun -->
<script src="js/part20_kill_end.js"></script>

<!-- Phần 21: UI + initApp -->
<script src="js/part21_ui.js"></script>

<!-- Phần 24: drawGame() hoàn chỉnh -->
<script src="js/part24_draw.js"></script>

<!-- Phần 25: initGame() + Game Loop khởi động -->
<script src="js/part25_init.js"></script>

<!--
 ══════════════════════════════════════
     Inline: Pause + End screen wiring
     ══════════════════════════════════════ -->
<script>
// ── Pause screen buttons ──
document.getElementById("btn-resume")
    ?.addEventListener("click", () => {
        AudioEngine.playClick();
        GS.paused = false;
        document.getElementById("screen-pause")
            ?.classList.add("hidden");
    });

document.getElementById("btn-restart-pause")
    ?.addEventListener("click", () => {
        AudioEngine.playClick();
        document.getElementById("screen-pause")
            ?.classList.add("hidden");
        GS.restartSameMap();
    });

document.getElementById("btn-quit-pause")
    ?.addEventListener("click", () => {
        AudioEngine.playClick();
        // Stop game
        GS.running = false;
        if (GS.animId) {
            cancelAnimationFrame(GS.animId);
            GS.animId = null;
        }
        AudioEngine.stopBGM();

        // Hide all game UI
        ["hud","hud-exp-bg",
         "shield-bar-wrap","boss-bar-wrap",
         "skill-btn","skill2-btn",
         "joystick-zone","settings-btn",
         "joystick-cfg-btn",
         "screen-pause"
        ].forEach(id =>
            document.getElementById(id)
                ?.classList.add("hidden"));

        // Show main
        UI.showScreen("screen-main");
        UI.save = SaveSystem.load();
        UI.renderMain();
    });

// ── End screen buttons ──
document.getElementById("btn-restart-end")
    ?.addEventListener("click", () => {
        AudioEngine.playClick();
        document.getElementById("screen-end")
            ?.classList.add("hidden");
        GS.restartSameMap();
        AudioEngine.startBGM();

        // Show game HUD
        ["hud","hud-exp-bg",
         "skill-btn","skill2-btn",
         "joystick-zone","settings-btn",
         "joystick-cfg-btn"
        ].forEach(id =>
            document.getElementById(id)
                ?.classList.remove("hidden"));
    });

document.getElementById("btn-quit-end")
    ?.addEventListener("click", () => {
        AudioEngine.playClick();
        document.getElementById("screen-end")
            ?.classList.add("hidden");

        UI.showScreen("screen-main");
        UI.save = SaveSystem.load();
        UI.renderMain();
    });

// ── Settings button (in-game) ──
document.getElementById("settings-btn")
    ?.addEventListener("click", () => {
        AudioEngine.playClick();
        const paused = GS.paused;
        GS.paused = true;
        document.getElementById("screen-pause")
            ?.classList.remove("hidden");
    });

// ── Joystick size config ──
document.getElementById("joystick-cfg-btn")
    ?.addEventListener("click", () => {
        const zone =
            document.getElementById(
                "joystick-zone");
        if (!zone) return;
        const cur =
            parseInt(zone.style.width)||110;
        const sizes = [80,110,140,170];
        const next =
            sizes[(sizes.indexOf(cur)+1)
                  % sizes.length];
        zone.style.width  = next+"px";
        zone.style.height = next+"px";
        GS.toast(`🕹️ Joystick: ${next}px`);
    });

// ── Keyboard: ESC = pause ──
document.addEventListener("keydown", e => {
    if (e.key === "Escape" && GS.running) {
        GS.paused = !GS.paused;
        const ps =
            document.getElementById(
                "screen-pause");
        if (GS.paused) {
            ps?.classList.remove("hidden");
        } else {
            ps?.classList.add("hidden");
        }
    }
});
</script>

</body>
      </html>
